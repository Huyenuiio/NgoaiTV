name: Check Channels Status

on:
  schedule:
    - cron: '0 0 * * *' # Chạy mỗi ngày lúc 00:00 UTC (07:00 sáng giờ VN)
  workflow_dispatch: # Cho phép kích hoạt chạy thủ công từ tab Actions

jobs:
  update-channels:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run stream health check script
        run: node scripts/checkChannels.js

      - name: Commit and push changes if updated
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add channels-verified.json
          
          # Chỉ commit nếu file channels-verified.json thực sự thay đổi
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: auto-update verified channels [skip ci]"
            git push
          else
            echo "No changes detected in verified channels list."
          fi
